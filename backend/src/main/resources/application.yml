server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always

spring:
  application:
    name: loan-dss-backend
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/loan_dss?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:loan_user}
    password: ${SPRING_DATASOURCE_PASSWORD:loan_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

info:
  app:
    name: ${spring.application.name}
    version: 0.1.0

app:
  jwt:
    secret: ${APP_JWT_SECRET:bG9hbi1kc3MtZGV2LXNlY3JldC1rZXktdGhpcnR5LXR3by1ieXRlcw==}
    expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES:120}
